name: Deploy docs to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
  # Rebuild & redeploy every morning at 9:00 a.m. America/Los_Angeles.
  # GitHub cron is UTC and does NOT observe daylight saving, so we fire at both
  # 16:00 UTC (9am PDT) and 17:00 UTC (9am PST) and let the `gate` job below run
  # the build only when it is actually 09:00 in Los Angeles.
  schedule:
    - cron: "0 16 * * *"
    - cron: "0 17 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel in-progress production deploys.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # DST-safe gate: scheduled runs only proceed at exactly 9am Pacific; pushes and
  # manual dispatches always proceed.
  gate:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - id: check
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          hour="$(TZ=America/Los_Angeles date +%H)"
          if [ "$hour" = "09" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "Skipping scheduled run: Pacific hour is $hour, not 09."
          fi

  build:
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Build site
        run: mkdocs build --clean --strict
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
